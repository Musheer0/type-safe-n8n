name: build project

on:
    pull_request:
        branches: [" main "]
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v2
              name: clone-repo
            - name: setup-node
              uses: actions/setup-node@v2
            - name: install pnpm
              run: npm install -g pnpm
            - name: install dependencies
              run: pnpm install
            - name: build project
              run: pnpm build